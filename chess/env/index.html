<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BoardArena Chess</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="board-area" aria-label="国际象棋棋盘">
      <div class="top-bar">
        <div>
          <h1>国际象棋</h1>
          <p id="statusText" class="status-text">准备开始</p>
        </div>
        <div class="top-actions">
          <button id="flipBtn" class="icon-button" type="button" aria-label="翻转棋盘" title="翻转棋盘">↕</button>
          <button id="importBtn" class="text-button" type="button">导入棋谱</button>
          <button id="newGameBtn" class="text-button" type="button">新局</button>
        </div>
      </div>

      <div id="board" class="board" aria-label="8乘8棋盘"></div>
    </section>

    <aside class="side-panel" aria-label="对局信息">
      <div class="control-group">
        <span class="control-label">模式</span>
        <div class="segmented" role="group" aria-label="模式">
          <button id="humanBotBtn" type="button" class="selected" aria-pressed="true">人机</button>
          <button id="humanHumanBtn" type="button" aria-pressed="false">人人</button>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">人类执子</span>
        <div class="segmented" role="group" aria-label="人类执子">
          <button id="whiteSeatBtn" type="button" class="selected" aria-pressed="true">白</button>
          <button id="blackSeatBtn" type="button" aria-pressed="false">黑</button>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">Bot</span>
        <select id="botSelect" class="select-control" aria-label="Bot">
          <option value="/gpt5p5/bot_easy">/gpt5p5/bot_easy</option>
          <option value="/gpt5p5/bot_medium">/gpt5p5/bot_medium</option>
          <option value="/gpt5p5/bot_hard" selected>/gpt5p5/bot_hard</option>
        </select>
      </div>

      <div class="control-group">
        <span class="control-label">动画速度</span>
        <select id="animationSpeedSelect" class="select-control" aria-label="动画速度">
          <option value="0">关闭</option>
          <option value="140">快</option>
          <option value="240" selected>标准</option>
          <option value="420">慢</option>
        </select>
      </div>

      <div class="control-group">
        <span class="control-label">棋子样式</span>
        <select id="pieceStyleSelect" class="select-control" aria-label="棋子样式">
          <option value="chessnut">chessnut</option>
          <option value="spatial">spatial</option>
          <option value="cburnett" selected>cburnett</option>
          <option value="merida">merida</option>
          <option value="rhosgfx">rhosgfx</option>
        </select>
      </div>

      <div class="control-group">
        <span class="control-label">棋盘方向</span>
        <select id="orientationSelect" class="select-control" aria-label="棋盘方向">
          <option value="white" selected>白方视角</option>
          <option value="black">黑方视角</option>
        </select>
      </div>

      <div class="players">
        <article id="whitePlayer" class="player-card">
          <div class="player-title">
            <img id="whiteMark" class="piece-mark" alt="" aria-hidden="true">
            <strong>白方</strong>
          </div>
          <span id="whiteType">人类</span>
        </article>
        <article id="blackPlayer" class="player-card">
          <div class="player-title">
            <img id="blackMark" class="piece-mark" alt="" aria-hidden="true">
            <strong>黑方</strong>
          </div>
          <span id="blackType">人类</span>
        </article>
      </div>

      <div class="fen-panel">
        <h2>FEN</h2>
        <p id="fenText"></p>
      </div>

      <div class="log-panel">
        <h2>记录</h2>
        <ol id="moveLog" class="move-log"></ol>
      </div>
    </aside>
  </main>

  <div id="importPanel" class="import-panel" hidden>
    <div class="import-box" role="dialog" aria-label="导入棋谱" aria-modal="true">
      <div class="import-header">
        <strong>导入棋谱</strong>
        <button id="importCloseBtn" class="icon-button" type="button" aria-label="关闭">×</button>
      </div>
      <p class="import-hint">
        支持 PGN 或按行格式（例：<code>白方: e4</code> / <code>黑方 Bot: e5</code>，按倒序排列也可）。
      </p>
      <div class="import-actions-top">
        <label class="text-button" for="importFileInput">选择文件</label>
        <input id="importFileInput" type="file" accept=".pgn,.txt,text/plain"
               aria-label="棋谱文件">
        <span id="importFileName" class="import-filename"></span>
      </div>
      <textarea id="importTextarea" class="import-textarea" rows="12"
                placeholder="粘贴棋谱文本，或从上方选择文件…" spellcheck="false"></textarea>
      <p id="importError" class="import-error" hidden></p>
      <div class="import-actions">
        <button id="importCancelBtn" class="text-button" type="button">取消</button>
        <button id="importSubmitBtn" class="text-button primary" type="button">导入</button>
      </div>
    </div>
  </div>

  <div id="promotionPanel" class="promotion-panel" hidden>
    <div class="promotion-box" role="dialog" aria-label="升变">
      <span>升变</span>
      <div id="promotionChoices" class="promotion-choices"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
