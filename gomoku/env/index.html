<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BoardArena Gomoku</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="board-area" aria-label="五子棋棋盘">
      <div class="top-bar">
        <div>
          <h1>五子棋 (Renju)</h1>
          <p id="statusText" class="status-text">准备开始</p>
        </div>
        <div class="top-actions">
          <button id="flipBtn" class="icon-button" type="button" aria-label="翻转棋盘" title="翻转棋盘">↕</button>
          <button id="newGameBtn" class="text-button" type="button">新局</button>
        </div>
      </div>

      <div id="board" class="board" aria-label="15乘15棋盘"></div>
    </section>

    <aside class="side-panel" aria-label="对局信息">
      <div class="control-group">
        <span class="control-label">模式</span>
        <div class="segmented" role="group" aria-label="模式">
          <button id="humanBotBtn" type="button" class="selected" aria-pressed="true">人机</button>
          <button id="humanHumanBtn" type="button" aria-pressed="false">人人</button>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">人类执子</span>
        <div class="segmented" role="group" aria-label="人类执子">
          <button id="blackSeatBtn" type="button" class="selected" aria-pressed="true">黑</button>
          <button id="whiteSeatBtn" type="button" aria-pressed="false">白</button>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">Bot</span>
        <select id="botSelect" class="select-control" aria-label="Bot">
          <option value="/claude_opus4p7/bot_easy">/claude_opus4p7/bot_easy</option>
          <option value="/claude_opus4p7/bot_hard" selected>/claude_opus4p7/bot_hard</option>
        </select>
      </div>

      <div class="control-group">
        <span class="control-label">棋盘方向</span>
        <select id="orientationSelect" class="select-control" aria-label="棋盘方向">
          <option value="black" selected>黑方视角</option>
          <option value="white">白方视角</option>
        </select>
      </div>

      <div class="score-panel">
        <article id="blackPlayer" class="player-row">
          <span class="stone-mark black" aria-hidden="true"></span>
          <strong>黑方</strong>
          <span id="blackType" class="player-type">人类</span>
          <span id="blackScore" class="score">0</span>
        </article>
        <article id="whitePlayer" class="player-row">
          <span class="stone-mark white" aria-hidden="true"></span>
          <strong>白方</strong>
          <span id="whiteType" class="player-type">Bot</span>
          <span id="whiteScore" class="score">0</span>
        </article>
      </div>

      <p class="hint-note">黑方禁手：长连 / 四四 / 三三。被禁的落点会自动从候选中过滤。</p>

      <div class="board-panel">
        <h2>棋盘</h2>
        <pre id="boardText"></pre>
      </div>

      <div class="log-panel">
        <h2>记录</h2>
        <ol id="moveLog" class="move-log"></ol>
      </div>
    </aside>
  </main>

  <script src="game.js"></script>
</body>
</html>
