<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BoardArena LQQ Play</title>
  <link rel="stylesheet" href="play.css">
</head>
<body>
  <main class="shell">
    <section class="board-area">
      <div class="topbar">
        <div>
          <h1>Luqiangqi</h1>
          <p id="status">Starting</p>
        </div>
        <button id="newGame" type="button">New Game</button>
      </div>
      <div id="board" class="board" aria-label="Luqiangqi board"></div>
    </section>

    <aside class="panel">
      <div class="control">
        <span>Mode</span>
        <select id="mode">
          <option value="human-bot">Human vs bot</option>
          <option value="human-human">Human vs human</option>
        </select>
      </div>
      <div class="control">
        <span>Human seat</span>
        <select id="seat">
          <option value="0">Player 1</option>
          <option value="1">Player 2</option>
        </select>
      </div>
      <div class="control">
        <span>Bot</span>
        <select id="bot"></select>
      </div>

      <div class="stats">
        <div><strong>Player 1</strong><span id="p0"></span></div>
        <div><strong>Player 2</strong><span id="p1"></span></div>
      </div>

      <div class="control">
        <span>Wall direction</span>
        <div class="segmented" role="group" aria-label="Wall direction">
          <button id="wallH" class="selected" type="button" aria-pressed="true">Horizontal</button>
          <button id="wallV" type="button" aria-pressed="false">Vertical</button>
        </div>
      </div>

      <div class="hint">Click highlighted squares to move. Click board gaps to place walls.</div>

      <ol id="log" class="log"></ol>
    </aside>
  </main>
  <script src="play.js"></script>
</body>
</html>
